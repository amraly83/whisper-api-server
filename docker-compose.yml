version: '3.8'

services:
  app:
    build: .
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
    ports:
      - "8083:8083"
    environment:
      - API_KEY=${API_KEY}
      - CORS_ORIGINS=*
      - MAX_DURATION=${MAX_DURATION:-600}
      - RATE_LIMIT=${RATE_LIMIT:-100}
      - REDIS_URL=redis://redis:6379/0
      - PYTHONUNBUFFERED=1
      - OMP_NUM_THREADS=1
    depends_on:
      - redis
    networks:
      - whisper-net

  redis:
    image: redis:alpine
    volumes:
      - redis_data:/data
    networks:
      - whisper-net

volumes:
  redis_data:

networks:
  whisper-net:

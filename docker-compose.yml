version: '3.8'

services:
  app:
    build: .
    ports:
      - "8083:8083"
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis
    networks:
      - whisper-net

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - whisper-net

volumes:
  redis_data:

networks:
  whisper-net:

version: '3.8'

services:
  app:
    build: . 
      resources:
        limits:
          cpus: '2'
          memory: 4G
    ports:
      - "8083:8083"
    environment:
      - API_KEY=${API_KEY}
      - CORS_ORIGINS=${CORS_ORIGINS}
      - MAX_DURATION=${MAX_DURATION}
      - RATE_LIMIT=${RATE_LIMIT}
      - REDIS_URL=${REDIS_URL}
      - PYTHONUNBUFFERED=${PYTHONUNBUFFERED}
      - OMP_NUM_THREADS=${OMP_NUM_THREADS}
    depends_on:
      - redis
    networks:
      - whisper-net

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - whisper-net

volumes:
  redis_data:

networks:
  whisper-net:
